kind = "web"
previewPath = "/"
title = "Bike Market"
version = "1.0.0"
id = "artifacts/bike-market"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 25990

[services.development]
run = "pnpm --filter @workspace/bike-market run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bike-market", "run", "build" ]
publicDir = "artifacts/bike-market/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "25990"
BASE_PATH = "/"
