openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Bike marketplace API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: bikes
    description: Bike listings
  - name: favorites
    description: User favorites
  - name: admin
    description: Admin operations
  - name: auth
    description: Account authentication (admin and showroom accounts)
  - name: showrooms
    description: Showroom (dealer) operations
  - name: Storage
    description: Object storage upload and serving endpoints.
paths:
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current account info
      responses:
        "200":
          description: Account info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AccountInfo"
        "401":
          description: Unauthorized

  /showrooms/{id}:
    get:
      operationId: getShowroom
      tags: [showrooms]
      summary: Get public showroom profile
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Showroom profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Showroom"
        "404":
          description: Not found

  /admin/showrooms:
    get:
      operationId: adminListShowrooms
      tags: [admin]
      summary: Admin - list all showrooms
      responses:
        "200":
          description: All showrooms
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Showroom"
    post:
      operationId: adminCreateShowroom
      tags: [admin]
      summary: Admin - create showroom with its account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateShowroomBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Showroom"
        "409":
          description: Username already exists

  /admin/showrooms/{id}:
    put:
      operationId: adminUpdateShowroom
      tags: [admin]
      summary: Admin - update showroom (optionally reset password)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShowroomBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Showroom"
    delete:
      operationId: adminDeleteShowroom
      tags: [admin]
      summary: Admin - delete showroom, its account and its bikes
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /showroom/bikes:
    get:
      operationId: showroomListBikes
      tags: [showrooms]
      summary: Showroom - list own bikes
      responses:
        "200":
          description: Showroom's bikes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bike"
    post:
      operationId: showroomCreateBike
      tags: [showrooms]
      summary: Showroom - create a bike listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBikeBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bike"

  /showroom/bikes/{id}:
    put:
      operationId: showroomUpdateBike
      tags: [showrooms]
      summary: Showroom - update own bike listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateShowroomBikeBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bike"
    delete:
      operationId: showroomDeleteBike
      tags: [showrooms]
      summary: Showroom - delete own bike listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /bikes:
    get:
      operationId: listBikes
      tags: [bikes]
      summary: List all bike listings
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: condition
          in: query
          schema:
            type: string
        - name: minPrice
          in: query
          schema:
            type: number
        - name: maxPrice
          in: query
          schema:
            type: number
        - name: search
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
        - name: minMileage
          in: query
          schema:
            type: number
        - name: maxMileage
          in: query
          schema:
            type: number
        - name: province
          in: query
          schema:
            type: string
        - name: hasDelivery
          in: query
          schema:
            type: boolean
        - name: hasDocuments
          in: query
          schema:
            type: boolean
        - name: showroomId
          in: query
          schema:
            type: integer
      responses:
        "200":
          description: List of bikes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bike"
    post:
      operationId: createBike
      tags: [bikes]
      summary: Create a new bike listing
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBikeBody"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bike"

  /bikes/{id}:
    get:
      operationId: getBike
      tags: [bikes]
      summary: Get bike by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Bike details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bike"
        "404":
          description: Not found
    put:
      operationId: updateBike
      tags: [bikes]
      summary: Update a bike listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBikeBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bike"
    delete:
      operationId: deleteBike
      tags: [bikes]
      summary: Delete a bike listing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /bikes/my:
    get:
      operationId: getMyBikes
      tags: [bikes]
      summary: Get current user's bike listings
      responses:
        "200":
          description: User's bikes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bike"

  /bikes/stats:
    get:
      operationId: getBikeStats
      tags: [bikes]
      summary: Get marketplace stats
      responses:
        "200":
          description: Marketplace stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MarketplaceStats"

  /favorites:
    get:
      operationId: getFavorites
      tags: [favorites]
      summary: Get current user's favorites
      responses:
        "200":
          description: Favorites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bike"

  /favorites/{bikeId}:
    post:
      operationId: addFavorite
      tags: [favorites]
      summary: Add bike to favorites
      parameters:
        - name: bikeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "201":
          description: Added
    delete:
      operationId: removeFavorite
      tags: [favorites]
      summary: Remove bike from favorites
      parameters:
        - name: bikeId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Get admin dashboard stats
      responses:
        "200":
          description: Admin stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  /admin/bikes:
    get:
      operationId: adminListBikes
      tags: [admin]
      summary: Admin - list all bikes (including pending)
      responses:
        "200":
          description: All bikes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Bike"

  /admin/bikes/{id}/status:
    put:
      operationId: adminUpdateBikeStatus
      tags: [admin]
      summary: Admin - update bike listing status
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateBikeStatusBody"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Bike"

  /admin/users:
    get:
      operationId: adminListUsers
      tags: [admin]
      summary: Admin - list all users
      responses:
        "200":
          description: All users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /storage/uploads/request-url:
    post:
      tags: [Storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      description: |
        Returns a presigned GCS URL for direct upload. The client sends JSON
        metadata here, then uploads the file directly to the returned URL.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UploadUrlRequest'
      responses:
        '200':
          description: Presigned upload URL generated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UploadUrlResponse'
        '400':
          description: Missing or invalid required fields.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to generate upload URL.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/public-objects/{filePath}:
    get:
      tags: [Storage]
      operationId: getPublicObject
      summary: Serve a public asset from PUBLIC_OBJECT_SEARCH_PATHS
      description: |
        Unconditionally public — no authentication or ACL checks.
        Searches PUBLIC_OBJECT_SEARCH_PATHS for the given file path.
      parameters:
        - name: filePath
          in: path
          required: true
          schema:
            type: string
          description: Relative file path within the public search paths.
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: File not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to serve public object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
  /storage/objects/{objectPath}:
    get:
      tags: [Storage]
      operationId: getStorageObject
      summary: Serve an object entity from PRIVATE_OBJECT_DIR
      description: |
        Serves object entities uploaded via presigned URLs. These can optionally
        be protected with authentication or ACL checks based on the use case.
      parameters:
        - name: objectPath
          in: path
          required: true
          schema:
            type: string
          description: Object path within the private object dir (e.g. `uploads/some-uuid`).
      responses:
        '200':
          description: Object content streamed with correct Content-Type.
          content:
            '*/*':
              schema:
                type: string
                format: binary
        '404':
          description: Object not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '500':
          description: Failed to serve object.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Bike:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
          description: "electric, motorcycle, or bicycle sub-type: mountain, road, hybrid, kids"
        condition:
          type: string
          description: "new, used"
        brand:
          type: string
        phone:
          type: string
        images:
          type: array
          items:
            type: string
        mileage:
          type: number
        engineCapacity:
          type: number
          description: "motorcycle engine capacity in cc"
        province:
          type: string
          description: "one of the 18 Iraqi governorates"
        hasDelivery:
          type: boolean
        hasDocuments:
          type: boolean
          description: "motorcycle has official registration papers"
        status:
          type: string
          description: "active, pending, sold, rejected"
        showroomId:
          type: integer
          nullable: true
        showroom:
          $ref: "#/components/schemas/ShowroomSummary"
          nullable: true
        userId:
          type: string
        userName:
          type: string
        userEmail:
          type: string
        isFavorited:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - title
        - price
        - category
        - condition
        - phone
        - status
        - userId
        - createdAt

    CreateBikeBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        condition:
          type: string
        brand:
          type: string
        phone:
          type: string
        images:
          type: array
          items:
            type: string
        mileage:
          type: number
        engineCapacity:
          type: number
        province:
          type: string
        hasDelivery:
          type: boolean
        hasDocuments:
          type: boolean
      required:
        - title
        - price
        - category
        - condition
        - phone
        - province

    UpdateBikeBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        condition:
          type: string
        brand:
          type: string
        phone:
          type: string
        images:
          type: array
          items:
            type: string
        mileage:
          type: number
        engineCapacity:
          type: number
        province:
          type: string
        hasDelivery:
          type: boolean
        hasDocuments:
          type: boolean

    UpdateBikeStatusBody:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required:
        - username
        - password

    AuthSession:
      type: object
      properties:
        token:
          type: string
        username:
          type: string
        role:
          type: string
          description: "admin or showroom"
        showroom:
          $ref: "#/components/schemas/ShowroomSummary"
          nullable: true
      required:
        - token
        - username
        - role

    AccountInfo:
      type: object
      properties:
        username:
          type: string
        role:
          type: string
        showroom:
          $ref: "#/components/schemas/ShowroomSummary"
          nullable: true
      required:
        - username
        - role

    ShowroomSummary:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        imageUrl:
          type: string
          nullable: true
        googleMapsUrl:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        verified:
          type: boolean
      required:
        - id
        - name
        - verified

    Showroom:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        imageUrl:
          type: string
          nullable: true
        googleMapsUrl:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        verified:
          type: boolean
        username:
          type: string
          nullable: true
        bikesCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - verified

    CreateShowroomBody:
      type: object
      properties:
        name:
          type: string
        imageUrl:
          type: string
        googleMapsUrl:
          type: string
        phone:
          type: string
        username:
          type: string
        password:
          type: string
      required:
        - name
        - username
        - password

    UpdateShowroomBody:
      type: object
      properties:
        name:
          type: string
        imageUrl:
          type: string
        googleMapsUrl:
          type: string
        phone:
          type: string
        verified:
          type: boolean
        password:
          type: string
          description: "if provided, resets the showroom account password"

    UpdateShowroomBikeBody:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        condition:
          type: string
        brand:
          type: string
        phone:
          type: string
        images:
          type: array
          items:
            type: string
        mileage:
          type: number
        engineCapacity:
          type: number
        province:
          type: string
        hasDelivery:
          type: boolean
        hasDocuments:
          type: boolean
        status:
          type: string
          description: "active or sold"

    MarketplaceStats:
      type: object
      properties:
        totalListings:
          type: integer
        activeListings:
          type: integer
        soldListings:
          type: integer
        categoryBreakdown:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              count:
                type: integer
            required:
              - category
              - count
        recentListings:
          type: array
          items:
            $ref: "#/components/schemas/Bike"
      required:
        - totalListings
        - activeListings
        - soldListings
        - categoryBreakdown
        - recentListings

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        totalBikes:
          type: integer
        activeBikes:
          type: integer
        pendingBikes:
          type: integer
        soldBikes:
          type: integer
        rejectedBikes:
          type: integer
        newUsersThisMonth:
          type: integer
        newBikesThisMonth:
          type: integer
      required:
        - totalUsers
        - totalBikes
        - activeBikes
        - pendingBikes
        - soldBikes
        - rejectedBikes
        - newUsersThisMonth
        - newBikesThisMonth

    User:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
        name:
          type: string
        listingsCount:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - email
        - createdAt

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
          description: Original file name.
        size:
          type: integer
          minimum: 1
          description: File size in bytes.
        contentType:
          type: string
          minLength: 1
          description: MIME type of the file (e.g. `image/jpeg`).
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
          description: Presigned GCS URL for PUT upload.
        objectPath:
          type: string
          description: Normalized object path (e.g. `/objects/uploads/uuid`). Store this in your database.
        metadata:
          $ref: '#/components/schemas/UploadUrlRequest'
    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: string
